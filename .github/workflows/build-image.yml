name: Build & push image

# Firecrawl's nuq-postgres (Postgres 17 + pg_cron + NUQ schema) is published upstream as amd64-only,
# so it can't schedule on the Oracle ARM (aarch64) node. This rebuilds it for arm64 from Firecrawl's
# source and pushes to GHCR: ghcr.io/<owner>/nuq-postgres-docker:latest
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Sparse-checkout only the nuq-postgres build context from Firecrawl (public repo).
      - name: Checkout Firecrawl nuq-postgres source
        uses: actions/checkout@v4
        with:
          repository: firecrawl/firecrawl
          sparse-checkout: apps/nuq-postgres
          sparse-checkout-cone-mode: false
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/nuq-postgres
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nuq-postgres-docker:latest
            ghcr.io/${{ github.repository_owner }}/nuq-postgres-docker:${{ github.sha }}
